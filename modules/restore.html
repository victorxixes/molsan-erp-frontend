<template id="tpl-restore">

<div class="modulo-wrapper fade-in">

    <div id="module-container">

        <h2 class="titulo-modulo">♻️ Restaurar Backup</h2>

        <div class="card-glass p-20">

            <!-- INPUT FILE -->
            <input type="file" id="restoreFile" accept=".json" class="input-file">

            <!-- BOTONES -->
            <button id="btnVistaPrevia" class="btn-secondary mt-20">
                Vista previa
            </button>

            <button id="btnRestaurar" class="btn-primary mt-10">
                Restaurar
            </button>

            <!-- PREVIEW -->
            <div id="restorePreview" class="mt-20"></div>

        </div>

    </div>

</div>

</template>
