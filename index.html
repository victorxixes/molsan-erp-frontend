

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MOLSAN ERP — Glass Luxe 2027</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/molsan.css">
    <link rel="stylesheet" href="css/informes-dinamicos.css">

    <!-- Librerías externas -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
        window.v = Date.now(); /* Romper caché */
    </script>
</head>

<body>

<!-- ICONOS SVG -->
<svg style="display:none;">
    <symbol id="icon-menu" viewBox="0 0 24 24">
        <path d="M3 6h18M3 12h18M3 18h18"/>
    </symbol>
    <symbol id="icon-close" viewBox="0 0 24 24">
        <path d="M6 6l12 12M6 18L18 6"/>
    </symbol>
</svg>

<!-- BOTÓN SIDEBAR -->
<button id="sidebarToggle" class="sidebar-toggle-btn">
    <svg class="icon"><use href="#icon-menu"></use></svg>
</button>

<!-- SIDEBAR -->
<div class="sidebar">
    <ul>
        <li class="menu-item" onclick="cargarModulo('dashboard')">
            <span class="icon">📊</span><span class="text">Dashboard</span>
        </li>

        <li class="menu-item" onclick="cargarModulo('listado')">
            <span class="icon">📄</span><span class="text">Listado</span>
        </li>

        <li class="menu-item" onclick="cargarModulo('uploader')">
            <span class="icon">📂</span><span class="text">Importar Excel</span>
        </li>

        <li class="menu-item" onclick="cargarModulo('configuracion')">
            <span class="icon">⚙️</span><span class="text">Configuración</span>
        </li>

        <li class="menu-item" onclick="cargarModulo('permisos')">
            <span class="icon">🔐</span><span class="text">Permisos</span>
        </li>

        <li class="menu-item" onclick="cargarModulo('backup')">
            <span class="icon">💾</span><span class="text">Backup</span>
        </li>

        <li class="menu-item" onclick="cargarModulo('restore')">
            <span class="icon">♻️</span><span class="text">Restaurar</span>
        </li>

        <hr>

        <li class="menu-item" onclick="cargarModulo('informes-premium')">
            <span class="icon">📘</span><span class="text">Informes Premium</span>
        </li>

        <li class="menu-item" onclick="cargarModulo('informes-dinamicos')">
            <span class="icon">📑</span><span class="text">Informes Dinámicos</span>
        </li>
    </ul>
</div>

<!-- CABECERA -->
<header class="main-header">
    <h1>MOLSAN ERP — Glass Luxe 2027</h1>
    <h2 id="module-title" class="module-title"></h2>
</header>

<!-- AVISO PERMISOS -->
<div id="avisoPermisos" style="display:none;"></div>

<!-- CONTENEDOR PRINCIPAL -->
<div id="module-container" class="module-container"></div>

<!-- ============================
     TEMPLATES DE MÓDULOS
============================ -->

<!-- DASHBOARD -->
<template id="tpl-dashboard">
    <div class="modulo-wrapper fade-in dashboard-wrapper">

        <h2 class="titulo-modulo">📊 Dashboard</h2>

        <div class="card-glass p-20">

            <div class="kpi-grid">
                <div class="kpi-box">Total: <span id="kpiTotal">0</span></div>
                <div class="kpi-box">Hoy: <span id="kpiHoy">0</span></div>
                <div class="kpi-box">Media días: <span id="kpiMedia">0</span></div>
                <div class="kpi-box">VC: <span id="kpiVC">0</span></div>
            </div>

            <div class="dashboard-chart mt-30">
                <canvas id="chartFirmasMes" height="120"></canvas>
            </div>

            <div class="dashboard-chart mt-30">
                <canvas id="chartTipoFirma" height="120"></canvas>
            </div>

            <button class="btn-primary mt-20" onclick="informeReunion()">Informe para reunión</button>

        </div>

    </div>
</template>

<!-- LISTADO -->
<template id="tpl-listado">
    <div class="modulo-wrapper fade-in">

        <h2 class="titulo-modulo">📄 Listado de Expedientes</h2>

        <div class="card-glass p-20">

            <div class="filtros-grid">
                <input id="filtroExpediente" placeholder="Expediente">
                <input id="filtroApoderado" placeholder="Apoderado">
                <input id="filtroOficina" placeholder="Oficina">
                <input id="filtroCircuito" placeholder="Circuito">
                <input id="filtroTipoFirma" placeholder="Tipo Firma">
                <input id="filtroMes" placeholder="Mes">
                <input id="filtroAnio" placeholder="Año">
                <input id="filtroDiasMin" placeholder="Días mín">
                <input id="filtroDiasMax" placeholder="Días máx">
            </div>

            <button class="btn-primary mt-10" onclick="aplicarFiltros()">Aplicar filtros</button>

            <div id="chipsFiltros" class="chips mt-10"></div>

            <div class="tabla-scroll-x mt-20">
                <table class="tabla-listado tabla-sticky">
                    <thead>
                        <tr>
                            <th onclick="ordenarPor('expediente')">Expediente</th>
                            <th onclick="ordenarPor('oficina')">Oficina</th>
                            <th onclick="ordenarPor('fecha_alta')">Fecha Alta</th>
                            <th onclick="ordenarPor('contrato')">Contrato</th>
                            <th onclick="ordenarPor('tipo_provision')">Tipo Provisión</th>
                            <th onclick="ordenarPor('notario')">Notario</th>
                            <th>Provincia</th>
                            <th>Municipio</th>
                            <th>Comunidad</th>
                            <th>Protocolo</th>
                            <th onclick="ordenarPor('fecha_protocolo')">Fecha Protocolo</th>
                            <th>V.C.</th>
                            <th onclick="ordenarPor('apoderado')">Apoderado</th>
                            <th>Envio Notario</th>
                            <th onclick="ordenarPor('dias')">Días</th>
                            <th onclick="ordenarPor('mes')">Mes</th>
                            <th onclick="ordenarPor('anio')">Año</th>
                            <th onclick="ordenarPor('centro')">Centro</th>
                            <th>Tipo Gestión</th>
                            <th>Nombre</th>
                            <th>Apellidos</th>
                            <th>Centro que firma</th>
                            <th>Contrato 2</th>
                            <th>Notario 2</th>
                            <th onclick="ordenarPor('circuito')">Circuito notarial</th>
                            <th onclick="ordenarPor('tipo_firma')">Tipo de firma</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>

                    <tbody id="tabla-listado"></tbody>
                </table>
            </div>

            <div class="paginacion mt-20">
                <button id="btnPrev" class="btn-secondary" onclick="paginaAnterior()">Anterior</button>
                <span id="paginaActual"></span>
                <button id="btnNext" class="btn-secondary" onclick="siguientePagina()">Siguiente</button>
            </div>

            <button class="btn-primary mt-20" onclick="exportarFiltrados()">Exportar CSV</button>

        </div>

    </div>
</template>

<!-- UPLOADER -->
<template id="tpl-uploader">
    <div class="modulo-wrapper fade-in">

        <h2 class="titulo-modulo">📂 Importar Excel de Firmas</h2>

        <div class="card-glass p-20">

            <p class="texto-secundario">
                Selecciona el fichero Excel original descargado del programa.
            </p>

            <div class="input-file-box mt-10">
                <input type="file" id="excelFile" accept=".xlsx,.xls" class="input-file" />
            </div>

            <button id="btnImportar" class="btn-primary w-100 mt-20">
                Procesar Excel
            </button>

            <div id="progreso" class="progress-container mt-25">
                <div id="progreso-barra" class="progress-bar"></div>
            </div>

            <p id="progreso-texto" class="progress-text mt-10"></p>

        </div>
    </div>
</template>

<!-- CONFIGURACIÓN -->
<template id="tpl-configuracion">
    <div class="modulo-wrapper fade-in">

        <h2 class="titulo-modulo">⚙️ Configuración del Sistema</h2>

        <div class="card-glass p-20">

            <p class="texto-secundario">
                La normalización de datos se realiza automáticamente mediante reglas internas
                (Glass Luxe 2027). Los mapas manuales han sido eliminados.
            </p>

            <p class="mt-20">
                Para gestionar permisos del sistema, utiliza el módulo <strong>Permisos</strong>.
            </p>

        </div>

    </div>
</template>

<!-- PERMISOS -->
<template id="tpl-permisos">
    <div class="modulo-wrapper fade-in">

        <h2 class="titulo-modulo">🔐 Permisos</h2>

        <div class="card-glass p-20">

            <label><input type="checkbox" id="permImportar"> Importar Excel</label>
            <label><input type="checkbox" id="permBorrar"> Borrar datos</label>
            <label><input type="checkbox" id="permRestaurar"> Restaurar backups</label>
            <label><input type="checkbox" id="permExportar"> Exportar CSV</label>
            <label><input type="checkbox" id="permVerTodo"> Ver Informes Premium</label>

            <button class="btn-primary mt-20" onclick="guardarPermisos()">Guardar</button>

        </div>

    </div>
</template>

<!-- BACKUP -->
<template id="tpl-backup">
    <div class="modulo-wrapper fade-in">

        <h2 class="titulo-modulo">💾 Backup</h2>

        <div class="card-glass p-20">
            <button class="btn-primary" onclick="crearBackup()">Crear Backup</button>
            <div id="backupInfo" class="mt-20"></div>
        </div>

    </div>
</template>

<!-- RESTORE -->
<template id="tpl-restore">
    <div class="modulo-wrapper fade-in">

        <h2 class="titulo-modulo">♻️ Restaurar Backup</h2>

        <div class="card-glass p-20">

            <input type="file" id="restoreFile" accept=".json" class="input-file">

            <button id="btnVistaPrevia" class="btn-secondary mt-20">Vista previa</button>
            <button id="btnRestaurar" class="btn-primary mt-10">Restaurar</button>
            <button id="btnCancelar" class="btn-secondary mt-10">Cancelar</button>

            <div id="restorePreview" class="mt-20"></div>

        </div>

    </div>
</template>

<!-- INFORMES PREMIUM -->
<template id="tpl-informes-premium">
    <div class="modulo-wrapper fade-in">

        <h2 class="titulo-modulo">📘 Informes Premium</h2>

        <div class="grid-informes">

            <button class="btn-inf" onclick="generarInformeGeneral()">
                <svg viewBox="0 0 24 24"><path d="M3 3h18v18H3z"/></svg>
                Informe General
            </button>

            <button class="btn-inf" onclick="generarInformeAnual()">
                <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/></svg>
                Informe Anual
            </button>

            <button class="btn-inf" onclick="generarInformeMensual()">
                <svg viewBox="0 0 24 24"><path d="M3 8h18M3 16h18"/></svg>
                Informe Mensual
            </button>

            <button class="btn-inf" onclick="generarInformeApoderados()">
                <svg viewBox="0 0 24 24"><path d="M12 12a4 4 0 1 0-4-4"/></svg>
                Por Apoderado
            </button>

            <button class="btn-inf" onclick="generarInformeOficinas()">
                <svg viewBox="0 0 24 24"><path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4zM14 14h6v6h-6z"/></svg>
                Por Oficina
            </button>

            <button class="btn-inf" onclick="generarInformeCircuito()">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/></svg>
                Por Circuito
            </button>

            <button class="btn-inf" onclick="generarInformeTipoFirma()">
                <svg viewBox="0 0 24 24"><path d="M4 12h16"/></svg>
                Por Tipo de Firma
            </button>

            <button class="btn-inf" onclick="generarInformeTiempos()">
                <svg viewBox="0 0 24 24"><path d="M12 6v6l4 2"/></svg>
                Tiempos Medios
            </button>

        </div>

        <div id="informeContainer" class="card-glass mt-30" style="display:none;"></div>

    </div>
</template>

<!-- INFORMES DINÁMICOS -->
<template id="tpl-informes-dinamicos">

    <div class="modulo-wrapper fade-in">
        <div class="module-container">

            <h2 class="titulo-modulo">📑 Informes Dinámicos — Glass Luxe 2027</h2>

            <div class="card-glass p-20 mt-20">
                <div class="informes-header">

                    <div>
                        <label class="label">Tipo de informe</label>
                        <select id="selectInforme" class="input-select"></select>
                    </div>

                    <div>
                        <label class="label">Año (opcional)</label>
                        <input id="filtroAnioInforme" class="input-text" placeholder="Ej: 2024">
                    </div>

                    <div>
                        <label class="label">Mes (opcional)</label>
                        <input id="filtroMesInforme" class="input-text" placeholder="1-12">
                    </div>

                    <div class="informes-actions">
                        <button class="btn-primary" onclick="generarInformeDinamico()">Generar</button>
                        <button class="btn-secondary" onclick="imprimirInformeDinamico()">Imprimir</button>
                    </div>

                </div>
            </div>

            <div class="card-glass p-20 mt-20">
                <h3 class="titulo-modulo" id="tituloInformeActual">Informe</h3>

                <div id="contenedorTablaInforme" class="tabla-scroll-x mt-20">
                    <table id="tablaInformeDinamico" class="table-excel"></table>
                </div>
            </div>

        </div>
    </div>

</template>

<!-- MODAL DETALLE -->
<div id="modal-detalle" class="modal-overlay hidden">
    <div class="modal-box">

        <div class="modal-header">
            <h3 id="detalleTitulo">Detalle del expediente</h3>
            <button class="modal-close" onclick="cerrarModalDetalle()">✕</button>
        </div>

        <div class="modal-body" id="detalleContenido"></div>

        <div class="modal-footer">
            <button class="btn-secondary" onclick="cerrarModalDetalle()">Cerrar</button>
        </div>

    </div>
</div>

<!-- ============================ SCRIPTS ============================ -->

<script src="js/reglas.js?v=2"></script>
<script src="js/storage.js?v=2"></script>
<script src="js/kpis.js?v=2"></script>
<script src="js/importador.js?v=2"></script>
<script src="js/dashboard.js?v=2"></script>
<script src="js/listado.js?v=2"></script>
<script src="js/filtros.js?v=2"></script>
<script src="js/uploader.js?v=2"></script>
<script src="js/backup.js?v=2"></script>
<script src="js/restore.js?v=2"></script>

<!-- INFORMES PREMIUM (corregido) -->
<script src="js/informes.js?v=2"></script>

<!-- INFORMES DINÁMICOS -->
<script src="js/informes-dinamicos.js?v=2"></script>

<script src="js/permisos.js?v=2"></script>
<script src="js/configuracion.js?v=2"></script>
<script src="js/sidebar.js?v=2"></script>

<!-- MOTOR PRINCIPAL -->
<script src="js/main.js?v=2"></script>

</body>
</html>
